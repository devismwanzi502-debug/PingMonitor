name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # THIS ACTION DOWNLOADS GRADLE AUTOMATICALLY (NO JAR NEEDED)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Rename APK File
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PingMonitorX.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PingMonitorX-Debug-Build
          path: app/build/outputs/apk/debug/PingMonitorX.apk
          retention-days: 7
