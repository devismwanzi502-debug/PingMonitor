name: Compile Ping Monitor X Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger a build inside GitHub at any time

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout PingMonitor Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permissions to Gradle
      run: chmod +x gradlew

    - name: Generate Debug Keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore \
        -storepass android -alias androiddebugkey -keypass android \
        -keyalg RSA -keysize 2048 -validity 10000 \
        -dname "CN=Android Debug,O=Android,C=US"

    - name: Assemble Debug APK Binary
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Ping Monitor X APK
      uses: actions/upload-artifact@v4
      with:
        name: Ping-Monitor-X-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        
